name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build source archive
        run: |
          TAG="${GITHUB_REF_NAME}"
          git archive \
            --format=tar.gz \
            --prefix="claude-verify-${TAG#v}/" \
            --output="claude-verify-${TAG#v}.tar.gz" \
            HEAD

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "${TAG}" \
            --title "${TAG}" \
            --generate-notes \
            "claude-verify-${TAG#v}.tar.gz#Source archive (claude-verify-${TAG#v}.tar.gz)"
